apiVersion: v2
name: THISJOWI
description: Complete microservices platform - Password Manager, OTP, Notes, Messages, Authentication. Plug & play installation with auto-generated secure secrets.
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - thisjowi
  - microservices
  - password-manager
  - otp
  - notes
  - messages
  - auth
home: https://github.com/THISJOWI/THISJOWI-HELM-CHART
icon: https://raw.githubusercontent.com/THISJOWI/THISJOWI-HELM-CHART/main/helm/icon.png
sources:
  - https://github.com/THISJOWI/THISJOWI-HELM-CHART
maintainers:
  - name: THISJOWI Team
    email: support@thisjowi.com
    url: https://github.com/THISJOWI

dependencies:
  # Tus microservicios (locales)
  - name: config-server
    version: "0.1.0"
    repository: "file://charts/config-server"
    condition: config-server.enabled

  - name: password-manager
    version: "0.1.0"
    repository: "file://charts/password-manager"
    condition: password-manager.enabled

  - name: otp-service
    version: "0.1.0"
    repository: "file://charts/otp-service"
    condition: otp-service.enabled

  - name: notes-service
    version: "0.1.0"
    repository: "file://charts/notes-service"
    condition: notes-service.enabled

  - name: messages-service
    version: "0.1.0"
    repository: "file://charts/messages-service"
    condition: messages-service.enabled

  - name: auth-service
    version: "0.1.0"
    repository: "file://charts/auth-service"
    condition: auth-service.enabled
