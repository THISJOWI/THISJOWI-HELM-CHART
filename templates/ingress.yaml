{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thisjowi-ingress
  annotations:
    linkerd.io/inject: enabled
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.ingress.entrypoint }}
    traefik.ingress.kubernetes.io/router.middlewares: ""
spec:
  ingressClassName: traefik
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1/passwords
            pathType: Prefix
            backend:
              service:
                name: password
                port:
                  number: 80
          - path: /v1/notes
            pathType: Prefix
            backend:
              service:
                name: notes
                port:
                  number: 80
          - path: /v1/otp
            pathType: Prefix
            backend:
              service:
                name: otp
                port:
                  number: 80
          - path: /v1/messages
            pathType: Prefix
            backend:
              service:
                name: messages
                port:
                  number: 80
          - path: /v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 80
{{- end }}