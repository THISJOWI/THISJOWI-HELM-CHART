{{- if .Values.security.networkPolicy.enabled }}
---
# Por defecto, denegar todo tráfico de entrada
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: thisjowi-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thisjowi.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Permitir tráfico dentro del namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: thisjowi-allow-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thisjowi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "thisjowi.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Permitir tráfico entre pods del mismo namespace
    - from:
        - podSelector: {}
  egress:
    # Permitir tráfico entre pods del mismo namespace
    - to:
        - podSelector: {}
    # Permitir DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Permitir tráfico externo (bases de datos, etc.)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 26257  # CockroachDB
        - protocol: TCP
          port: 6379   # Redis
        - protocol: TCP
          port: 9042   # Cassandra
        - protocol: TCP
          port: 9092   # Kafka

---
# Permitir tráfico del Ingress Controller (Traefik)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: thisjowi-allow-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thisjowi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "thisjowi.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Permitir desde Traefik
    - from:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    # Permitir desde el mismo namespace
    - from:
        - podSelector: {}
{{- end }}
