apiVersion: v1
kind: Secret
metadata:
  name: thisjowi-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thisjowi.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Base de datos
  DB_PORT: {{ .Values.secrets.dbPort | quote }}
  DB_USERNAME: {{ .Values.secrets.dbUsername | quote }}
  DB_PASSWORD: {{ include "thisjowi.generateSecret" .Values.secrets.dbPassword }}
  DB_NAME: {{ .Values.secrets.dbName | quote }}
  DB_SSL_MODE: {{ .Values.secrets.dbSSLMode | quote }}

  # Redis
  REDIS_PORT: {{ .Values.secrets.redisPort | quote }}
  REDIS_PASSWORD: {{ include "thisjowi.generateSecret" .Values.secrets.redisPassword }}
  REDIS_DB: {{ .Values.secrets.redisDB | quote }}

  # Kafka
  KAFKA_HOST: {{ .Values.secrets.kafkaHost | quote }}
  KAFKA_PORT: {{ .Values.secrets.kafkaPort | quote }}
  KAFKA_SECURITY_PROTOCOL: {{ .Values.secrets.kafkaSecurityProtocol | quote }}

  # JWT (crítico para seguridad)
  JWT_SECRET: {{ include "thisjowi.generateSecret" .Values.secrets.jwtSecret }}
  JWT_EXPIRATION: {{ .Values.secrets.jwtExpiration | quote }}

  # Cassandra
  CASSANDRA_HOST: {{ .Values.secrets.cassandraHost | quote }}
  CASSANDRA_PORT: {{ .Values.secrets.cassandraPort | quote }}
  CASSANDRA_USERNAME: {{ .Values.secrets.cassandraUsername | quote }}
  CASSANDRA_PASSWORD: {{ include "thisjowi.generateSecret" .Values.secrets.cassandraPassword }}
  CASSANDRA_KEYSPACE: {{ .Values.secrets.cassandraKeyspace | quote }}

  # Authentication
  AUTH_TOKEN: {{ include "thisjowi.generateSecret" .Values.secrets.authToken }}