    livenessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# -----------------------------------------------------------
# INFRAESTRUCTURA (Dependencias externas)
# -----------------------------------------------------------
infrastructure:
  # CockroachDB (Base de datos principal)
  cockroachdb:
    enabled: false # Activa si quieres instalar CockroachDB en el clúster
    replicaCount: 1
    persistentVolume:
      enabled: true
      size: "10Gi"
      storageClass: "default"

  # Redis (Caché)
  redis:
    enabled: false # Activa si quieres instalar Redis en el clúster
    replicaCount: 1

  # Kafka (Message broker)
  kafka:
    enabled: false # Activa si quieres instalar Kafka en el clúster
    replicaCount: 1

  # Cassandra (Almacén de mensajes)
  cassandra:
    enabled: false # Activa si quieres instalar Cassandra en el clúster
    replicaCount: 1
