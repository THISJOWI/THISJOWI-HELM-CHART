# ===========================================================
# THISJOWI - values.yaml (PLUG & PLAY SEGURO)
# ===========================================================
# ¡Sin configuración requerida! Todos los secretos se
# generan automáticamente de forma segura.
#
# Instalación rápida:
#   helm install thisjowi ./helm -n thisjowi --create-namespace
#
# Personalizar (opcional):
#   helm install thisjowi ./helm -n thisjowi --create-namespace \
#     --set ingress.host="mi-dominio.com" \
#     --set secrets.dbPassword="mi-contraseña-segura"
#
# Actualizar:
#   helm upgrade thisjowi ./helm -n thisjowi
# ===========================================================

# -----------------------------------------------------------
# SEGURIDAD & AUTENTICACIÓN
# -----------------------------------------------------------
security:
  enabled: true
  rbac:
    enabled: true
  networkPolicy:
    enabled: false # Activa si necesitas aislamiento de red
  podSecurityContext:
    enabled: true
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

# -----------------------------------------------------------
# INGRESS
# -----------------------------------------------------------
ingress:
  enabled: true
  host: "" # Auto-detecta IP si está vacío, o pon tu dominio
  autoDetectNodeIP: true # Obtiene IP del nodo automáticamente
  useNipIO: true # Convierte IP a dominio (192.168.1.100.nip.io)
  entrypoint: web # web = HTTP | websecure = HTTPS (configura Traefik)
  className: traefik
  tls:
    enabled: false # Activa para HTTPS con certificados

# -----------------------------------------------------------
# SECRETOS (Generación automática)
# Dejar vacío = generado automáticamente de forma segura
# Llenar = usar tu valor personalizado
# -----------------------------------------------------------
secrets:
  # Base de datos CockroachDB
  dbPort: "26257"
  dbUsername: "root"
  dbPassword: "" # Auto-genera si está vacío
  dbName: "thisjowi"
  dbSSLMode: "disable" # disable | require para producción

  # Redis Cache
  redisPort: "6379"
  redisPassword: "" # Auto-genera si está vacío
  redisDB: "0"

  # Kafka Messaging
  kafkaHost: "kafka"
  kafkaPort: "9092"
  kafkaSecurityProtocol: "PLAINTEXT" # PLAINTEXT | SASL_SSL

  # JWT Authentication (crítico para seguridad)
  jwtSecret: "" # Auto-genera 32+ caracteres aleatorios
  jwtExpiration: "86400" # 24 horas en segundos

  # Cassandra (para mensajes)
  cassandraHost: "cassandra"
  cassandraPort: "9042"
  cassandraUsername: "cassandra"
  cassandraPassword: "" # Auto-genera si está vacío
  cassandraKeyspace: "messaging"

  # Auth general
  authToken: "" # Auto-genera si está vacío

# -----------------------------------------------------------
# SERVICIOS
# Todos habilitados por defecto
# Cambiar 'tag' solo si necesitas versión específica
# -----------------------------------------------------------

environment: "development" # development | staging | production

config-server:
  enabled: true
  replicaCount: 1
  image:
    repository: thsjowi/config
    tag: "latest"
    pullPolicy: IfNotPresent
  containerPort: 8888
  health:
    readinessProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
    livenessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

password-manager:
  enabled: true
  replicaCount: 1
  image:
    repository: thsjowi/password
    tag: "latest"
    pullPolicy: IfNotPresent
  containerPort: 8084
  health:
    readinessProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
    livenessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

