    pullPolicy: IfNotPresent
  containerPort: 8086
  cassandra:
    host: "cassandra"
    port: "9042"
    datacenter: "DC1"
    keyspace: "messaging"
  kafka:
    host: "kafka"
    port: "9092"
    groupId: "messages-service"
  health:
    readinessProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
    livenessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
