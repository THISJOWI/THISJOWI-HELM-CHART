# ===========================================================
# THISJOWI - values.yaml
# ===========================================================
# Edita los valores marcados con [CONFIGURAR] antes de
# instalar el chart.
#
# Instalación:
#   helm install thisjowi ./THISJOWI-HELM-CHART -n thisjowi --create-namespace
#
# Actualizar tras editar:
#   helm upgrade thisjowi ./THISJOWI-HELM-CHART -n thisjowi
# ===========================================================

# -----------------------------------------------------------
# INGRESS
# -----------------------------------------------------------
ingress:
  enabled: true
  host: "" # [CONFIGURAR] tu dominio
  entrypoint: web # web = HTTP | websecure = HTTPS

# -----------------------------------------------------------
# SECRETOS
# Rellena todos los campos vacíos antes de instalar.
# -----------------------------------------------------------
secrets:
  dbPort: "26257" # [CONFIGURAR] ej: 26257
  dbUsername: "root" # [CONFIGURAR]
  dbPassword: "" # [CONFIGURAR]

  redisPort: "6379" # [CONFIGURAR] ej: 6379
  redisPassword: "" # [CONFIGURAR]

  kafkaHost: "kafka" # [CONFIGURAR] ej: kafka
  kafkaPort: "9092" # [CONFIGURAR] ej: 9092

  jwtSecret: "PEludmFsaWQgQmFzZTY0Pg==" # [CONFIGURAR] mínimo 32 caracteres

  cassandraUsername: "cassandra" # [CONFIGURAR]
  cassandraPassword: "cassandra" # [CONFIGURAR]

  auth: "" # [CONFIGURAR]

# -----------------------------------------------------------
# SERVICIOS
# Puedes cambiar las versiones (tag) si lo necesitas.
# El resto de valores funcionan por defecto.
# -----------------------------------------------------------

config-server:
  enabled: true
  replicaCount: 1
  image:
    repository: thsjowi/config
    tag: "latest" # [CONFIGURAR] versión a desplegar
    pullPolicy: Always
  containerPort: 8888
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

password-manager:
  enabled: true
  replicaCount: 1
  image:
    repository: thsjowi/password
    tag: "latest" # [CONFIGURAR] versión a desplegar
    pullPolicy: Always
  containerPort: 8084
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

otp-service:
  enabled: true
  replicaCount: 1
  image:
    repository: thsjowi/otp
    tag: "latest" # [CONFIGURAR] versión a desplegar
    pullPolicy: Always
  containerPort: 8085
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

notes-service:
  enabled: true
  replicaCount: 1
  image:
    repository: thsjowi/note
    tag: "latest" # [CONFIGURAR] versión a desplegar
    pullPolicy: Always
  containerPort: 8083
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

messages-service:
  enabled: true
  replicaCount: 1
  image:
    repository: thsjowi/messages
    tag: "latest" # [CONFIGURAR] versión a desplegar
    pullPolicy: Always
  containerPort: 8086
  cassandra:
    host: "cassandra" # [CONFIGURAR] si usas Cassandra externo, pon su host
    port: "9042"
    datacenter: "DC1"
    keyspace: "messaging"
  kafka:
    host: "kafka" # [CONFIGURAR] si usas Kafka externo, pon su host
    port: "9092"
    groupId: "messages-service"
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

auth-service:
  enabled: true
  replicaCount: 1
  image:
    repository: thsjowi/auth
    tag: "latest" # [CONFIGURAR] versión a desplegar
    pullPolicy: Always
  containerPort: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
