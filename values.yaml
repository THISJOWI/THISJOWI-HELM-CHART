  enabled: true
  replicaCount: 1
  image:
    repository: thsjowi/otp
    tag: "latest"
    pullPolicy: IfNotPresent
  containerPort: 8085
  health:
    readinessProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
    livenessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

notes-service:
  enabled: true
  replicaCount: 1
  image:
    repository: thsjowi/note
    tag: "latest"
    pullPolicy: IfNotPresent
  containerPort: 8083
  health:
    readinessProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
    livenessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
